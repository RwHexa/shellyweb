<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wohnung Grundriss · SmartHomeRw</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f14; --surface:#161921; --card:#1e2230; --border:#2a2f42;
      --accent:#00e5a0; --accent2:#0099ff; --danger:#ff4757; --warn:#ffa502;
      --text:#e8ecf0; --muted:#6b7494;
      --font-ui:'Rajdhani',sans-serif; --font-mono:'JetBrains Mono',monospace;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-ui); min-height:100vh; padding:0 0 40px 0; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }
    #wrapper { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:20px 24px; }
    .header { display:flex; align-items:center; justify-content:space-between; padding-bottom:20px; margin-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:14px; }
    .header-logo { display:flex; align-items:center; gap:14px; }
    .header-logo img { width:42px; height:42px; border-radius:8px; }
    .header-title { font-size:22px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .header-title span { color:var(--accent); }
    .nav-link { background:var(--surface); color:var(--text); text-decoration:none; border:1px solid var(--border); border-radius:8px; padding:10px 18px; font-family:var(--font-ui); font-size:13px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; transition:all 0.2s; }
    .nav-link:hover { background:var(--card); border-color:var(--accent2); color:var(--accent); }
    .conn-badge { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:20px; }
    .conn-dot { width:9px; height:9px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
    .conn-dot.connected { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    .conn-dot.connecting { background:var(--warn); animation:pulse 1s infinite; }
    .conn-dot.disconnected { background:var(--danger); }
    .conn-dot.busy { background:var(--accent2); animation:pulse 0.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #connLabel { font-family:var(--font-mono); font-size:12px; color:var(--muted); }
    .section-title { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    .floor-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:20px; }
    .floor-wrap { position:relative; width:100%; max-width:700px; margin:0 auto; background:#1a1d2a; border-radius:8px; overflow:hidden; }
    .floor-img { width:100%; height:auto; display:block; }
    .lamp { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:5; }
    .lamp-dot { width:24px; height:24px; border-radius:50%; background:#1e2230; border:3px solid var(--muted); margin:0 auto; transition:all 0.3s; }
    .lamp.on .lamp-dot { background:var(--accent); border-color:#fff; box-shadow:0 0 16px var(--accent), 0 0 32px var(--accent); animation:glow 2s ease-in-out infinite; }
    .lamp.offline .lamp-dot { border-color:var(--danger); border-style:dashed; }
    .lamp.busy .lamp-dot { border-color:var(--accent2); animation:pulse 0.6s infinite; }
    .lamp.demo .lamp-dot { border-color:var(--accent2); border-style:dotted; }
    .lamp.demo.on .lamp-dot { background:var(--accent2); border-color:#fff; border-style:solid; box-shadow:0 0 16px var(--accent2); }
    @keyframes glow { 0%,100%{box-shadow:0 0 12px var(--accent), 0 0 24px var(--accent)} 50%{box-shadow:0 0 20px var(--accent), 0 0 40px var(--accent)} }
    .lamp-label { background:rgba(13,15,20,0.85); padding:3px 8px; border-radius:4px; text-align:center; margin-top:4px; line-height:1.2; white-space:nowrap; }
    .lamp-name { font-size:11px; font-weight:700; color:var(--text); letter-spacing:0.5px; }
    .lamp.on .lamp-name { color:var(--accent); }
    .lamp.offline .lamp-name { color:var(--danger); }
    .lamp.demo .lamp-name { color:var(--accent2); }
    .lamp-info { font-family:var(--font-mono); font-size:9px; color:var(--muted); margin-top:1px; }
    .legend { display:flex; justify-content:center; gap:18px; margin-top:14px; flex-wrap:wrap; font-family:var(--font-mono); font-size:11px; color:var(--muted); }
    .leg-item { display:flex; align-items:center; gap:6px; }
    .leg-dot { width:12px; height:12px; border-radius:50%; }
    .leg-on { background:var(--accent); box-shadow:0 0 6px var(--accent); }
    .leg-off { background:var(--card); border:2px solid var(--muted); }
    .leg-offline { background:var(--card); border:2px dashed var(--danger); }
    .leg-demo { background:var(--card); border:2px dotted var(--accent2); }
    .info { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 18px; font-size:13px; color:var(--muted); line-height:1.5; }

    /* ── Bewegungsmeldungen-Panel ── */
    .motion-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .motion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 71, 87, 0.05);
      flex-wrap: wrap;
      gap: 10px;
    }
    .motion-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }
    .motion-counter {
      background: var(--danger);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 10px;
      min-width: 24px;
      text-align: center;
      letter-spacing: 0;
    }
    .motion-counter.zero {
      background: var(--card);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-test-motion {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-test-motion:hover {
      background: rgba(0, 153, 255, 0.1);
      border-color: var(--accent2);
    }
    .motion-list {
      max-height: 280px;
      overflow-y: auto;
      padding: 14px 20px;
    }
    .motion-empty {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .motion-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--card);
      border-left: 3px solid var(--danger);
      border-radius: 6px;
      margin-bottom: 8px;
      animation: motionSlideIn 0.3s ease-out;
      gap: 12px;
    }
    .motion-item:last-child { margin-bottom: 0; }
    .motion-item.fading {
      animation: motionFadeOut 0.3s ease-out forwards;
    }
    @keyframes motionSlideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes motionFadeOut {
      from { opacity: 1; max-height: 60px; }
      to   { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
    }
    .motion-info { flex: 1; min-width: 0; }
    .motion-text {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .motion-meta {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .btn-ack {
      background: var(--accent);
      color: #0d1421;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-ack:hover {
      background: #00ffc0;
      transform: translateY(-1px);
    }
    .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--danger); color:var(--danger); padding:12px 24px; border-radius:8px; font-family:var(--font-ui); font-weight:600; letter-spacing:0.5px; z-index:1000; opacity:0; transition:opacity 0.3s; pointer-events:none; }
    .toast.show { opacity:1; }
    .toast.warn { border-color:var(--warn); color:var(--warn); }
    .toast.ok { border-color:var(--accent); color:var(--accent); }
    @media (max-width:600px) {
      #wrapper { padding:14px 14px; }
      .header { flex-direction:column; align-items:flex-start; }
      .header-title { font-size:18px; }
    }
  </style>
</head>

<script>
// ────────────────────────────────────────────────────────────
// SmartHomeRw Wohnung-Seite v1.4.0
// NEUE STRATEGIE: Pro Klick eine frische MQTT-Verbindung
// → kein Stale-State, kein Idle-Timeout, garantiert zuverlässig
// ────────────────────────────────────────────────────────────

var deviceID    = null;
var deviceName  = 'Wohnzimmer';
var clickGuard  = false;
var lampOn      = false;  // Lokaler Lampen-Status

function showToast(msg, kind) {
  var t = document.getElementById('toast');
  t.className = 'toast show' + (kind ? ' ' + kind : '');
  t.innerText = msg;
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function setConnState(state, label) {
  var dot = document.getElementById('connDot');
  var lbl = document.getElementById('connLabel');
  dot.className = 'conn-dot ' + state;
  lbl.innerText = label;
}

function updateLampVisual() {
  var lamp = document.getElementById('lampWohnzimmer');
  lamp.classList.remove('on', 'offline', 'busy');
  if (lampOn) lamp.classList.add('on');
}

function setLampBusy(busy) {
  var lamp = document.getElementById('lampWohnzimmer');
  if (busy) lamp.classList.add('busy');
  else lamp.classList.remove('busy');
}

function toggleDemo(el) { el.classList.toggle('on'); }

// Lade Zugangsdaten aus localStorage
function loadCredentials() {
  var creds = {
    host: localStorage.getItem('shelly_host'),
    port: localStorage.getItem('shelly_port') || '8884',
    user: localStorage.getItem('shelly_user'),
    pass: localStorage.getItem('shelly_pass')
  };
  var devs = localStorage.getItem('shelly_devices');
  if (devs) {
    try {
      var arr = JSON.parse(devs);
      if (arr.length > 0) {
        creds.deviceID = arr[0].id;
        creds.deviceName = arr[0].name;
      }
    } catch(e) {}
  }
  return creds;
}

// ── EINMAL-VERBINDUNG: connect, send, disconnect ──
function performMqttAction(creds, action, callback) {
  var url = 'wss://' + creds.host + ':' + creds.port + '/mqtt';
  var clientId = 'wohnung-' + Date.now() + '-' + Math.floor(Math.random() * 99999);
  var done = false;

  console.log('[MQTT] Connect ' + clientId);

  var client = mqtt.connect(url, {
    username: creds.user,
    password: creds.pass,
    clientId: clientId,
    clean:    true,
    reconnectPeriod: 0,    // kein Auto-Reconnect bei Einmal-Aktion
    connectTimeout:  8000,
    keepalive:       10
  });

  // Timeout
  var timeoutHandle = setTimeout(function() {
    if (done) return;
    done = true;
    console.error('[MQTT] Timeout');
    try { client.end(true); } catch(e) {}
    callback('timeout');
  }, 8000);

  client.on('connect', function() {
    console.log('[MQTT] Connected, executing action');
    action(client, function(result) {
      if (done) return;
      done = true;
      clearTimeout(timeoutHandle);
      // Verbindung sauber schließen
      setTimeout(function() {
        try { client.end(false); } catch(e) {}
        console.log('[MQTT] Disconnected');
      }, 500);
      callback(null, result);
    });
  });

  client.on('error', function(err) {
    if (done) return;
    done = true;
    clearTimeout(timeoutHandle);
    console.error('[MQTT] Error:', err);
    try { client.end(true); } catch(e) {}
    callback(err.message || 'error');
  });
}

// Klick auf Wohnzimmer → frische Verbindung, Schalt-Befehl, trennen
function onWohnzimmerClick() {
  if (clickGuard) return;
  clickGuard = true;
  setTimeout(function() { clickGuard = false; }, 1500);

  var creds = loadCredentials();
  if (!creds.host || !creds.user) {
    showToast('KEINE ZUGANGSDATEN', 'warn');
    return;
  }
  if (!creds.deviceID) {
    showToast('KEIN GERÄT', 'warn');
    return;
  }

  deviceID = creds.deviceID;
  var newOn = !lampOn;  // Neuer Zustand

  setConnState('busy', 'SCHALTE...');
  setLampBusy(true);

  performMqttAction(creds, function(client, done) {
    var topic = creds.deviceID + '/command/switch:0';
    var command = newOn ? 'on' : 'off';
    console.log('[ACTION] publish ' + topic + ' = ' + command);
    client.publish(topic, command, function(err) {
      // Kurz warten damit Shelly die Nachricht verarbeitet
      setTimeout(function() { done(err ? 'publish failed' : 'ok'); }, 300);
    });
  }, function(err, result) {
    setLampBusy(false);
    if (err) {
      setConnState('disconnected', 'FEHLER: ' + err);
      showToast('FEHLER: ' + err, 'warn');
    } else {
      lampOn = newOn;
      updateLampVisual();
      setConnState('connected', newOn ? 'EINGESCHALTET' : 'AUSGESCHALTET');
      document.getElementById('lampInfo').innerText = newOn ? 'EIN' : 'AUS';
      showToast(newOn ? '💡 EIN' : '○ AUS', 'ok');
      // Nach 3 Sekunden Status zurück zu "BEREIT"
      setTimeout(function() {
        setConnState('connected', 'BEREIT');
      }, 3000);
    }
  });
}

// Beim Laden: einmal Status holen
function loadInitialStatus() {
  var creds = loadCredentials();
  if (!creds.host || !creds.user) {
    setConnState('disconnected', 'KEINE ZUGANGSDATEN');
    document.getElementById('lampInfo').innerText = 'KEINE DATEN';
    return;
  }
  if (!creds.deviceID) {
    setConnState('disconnected', 'KEIN GERÄT');
    document.getElementById('lampInfo').innerText = 'KEIN GERÄT';
    return;
  }

  deviceID = creds.deviceID;
  document.querySelector('#lampWohnzimmer .lamp-name').innerText = creds.deviceName;

  setConnState('connecting', 'STATUS WIRD GELADEN...');

  performMqttAction(creds, function(client, done) {
    var statusReceived = false;
    // Topics abonnieren um aktuellen Status zu bekommen
    client.on('message', function(topic, message) {
      if (statusReceived) return;
      var payload = message.toString();
      try {
        var parsed = JSON.parse(payload);
        var sw = null;
        if (parsed.method === 'NotifyStatus' && parsed.params) {
          sw = parsed.params['switch:0'];
        } else if (parsed.result) {
          sw = parsed.result;
        }
        if (sw && sw.output !== undefined) {
          statusReceived = true;
          done({ on: sw.output, watt: sw.apower });
        }
      } catch(e) {}
    });
    client.subscribe(creds.deviceID + '/rpc/reply');
    // RPC-Anfrage senden
    var payload = JSON.stringify({
      id: 1,
      src: creds.deviceID + '/rpc/reply',
      method: 'Switch.GetStatus',
      params: { id: 0 }
    });
    client.publish(creds.deviceID + '/rpc', payload);
    // Falls keine Antwort in 3 Sekunden → trotzdem fertig
    setTimeout(function() {
      if (!statusReceived) done({ unknown: true });
    }, 3000);
  }, function(err, result) {
    if (err) {
      setConnState('disconnected', 'STATUS FEHLER');
      document.getElementById('lampInfo').innerText = '?';
      return;
    }
    if (result.unknown) {
      setConnState('connected', 'BEREIT (Status unbekannt)');
      document.getElementById('lampInfo').innerText = '?';
      return;
    }
    lampOn = result.on;
    updateLampVisual();
    setConnState('connected', 'BEREIT');
    document.getElementById('lampInfo').innerText = result.on ? 'EIN' : 'AUS';
  });
}

window.addEventListener('load', loadInitialStatus);

// ────────────────────────────────────────────────────────────
// Bewegungsmeldungen (BLU Motion - Demo Version)
// ────────────────────────────────────────────────────────────

var motionAlerts = [];  // Liste aller offenen Meldungen
var motionCounter = 0;  // Zählt für eindeutige IDs

function formatTime(date) {
  var h = String(date.getHours()).padStart(2, '0');
  var m = String(date.getMinutes()).padStart(2, '0');
  var s = String(date.getSeconds()).padStart(2, '0');
  return h + ':' + m + ':' + s;
}

function formatDate(date) {
  var d = String(date.getDate()).padStart(2, '0');
  var m = String(date.getMonth() + 1).padStart(2, '0');
  return d + '.' + m + '.';
}

// Neue Bewegungsmeldung hinzufügen
function addMotionAlert(sensorName, sensorAddress) {
  motionCounter++;
  var alert = {
    id:        'motion-' + motionCounter + '-' + Date.now(),
    timestamp: new Date(),
    sensor:    sensorName || 'BLU Motion',
    address:   sensorAddress || 'AA:BB:CC:DD:EE:FF'
  };
  motionAlerts.push(alert);
  saveMotionAlerts();
  renderMotionList();
  showToast('🚨 BEWEGUNG ERKANNT', 'warn');
}

// Meldung quittieren
function ackMotionAlert(id) {
  var item = document.querySelector('[data-motion-id="' + id + '"]');
  if (item) {
    item.classList.add('fading');
    setTimeout(function() {
      motionAlerts = motionAlerts.filter(function(a) { return a.id !== id; });
      saveMotionAlerts();
      renderMotionList();
    }, 300);
  } else {
    motionAlerts = motionAlerts.filter(function(a) { return a.id !== id; });
    saveMotionAlerts();
    renderMotionList();
  }
}

// In localStorage speichern (wegen Reload-Persistenz)
function saveMotionAlerts() {
  try {
    var data = motionAlerts.map(function(a) {
      return { id: a.id, timestamp: a.timestamp.toISOString(), sensor: a.sensor, address: a.address };
    });
    localStorage.setItem('motion_alerts', JSON.stringify(data));
  } catch(e) {}
}

// Aus localStorage laden
function loadMotionAlerts() {
  try {
    var raw = localStorage.getItem('motion_alerts');
    if (!raw) return;
    var data = JSON.parse(raw);
    motionAlerts = data.map(function(a) {
      return { id: a.id, timestamp: new Date(a.timestamp), sensor: a.sensor, address: a.address };
    });
  } catch(e) { motionAlerts = []; }
}

// Liste rendern
function renderMotionList() {
  var list = document.getElementById('motionList');
  var counter = document.getElementById('motionCount');
  if (!list || !counter) return;

  counter.innerText = motionAlerts.length;
  counter.classList.toggle('zero', motionAlerts.length === 0);

  if (motionAlerts.length === 0) {
    list.innerHTML =
      '<div class="motion-empty">' +
        '<span style="font-size:24px; opacity:0.4;">🌙</span><br>' +
        '<span style="margin-top:8px; display:inline-block;">Keine aktiven Meldungen</span>' +
      '</div>';
    return;
  }

  // Neueste zuerst
  var sorted = motionAlerts.slice().sort(function(a, b) {
    return b.timestamp.getTime() - a.timestamp.getTime();
  });

  list.innerHTML = sorted.map(function(a) {
    return '' +
      '<div class="motion-item" data-motion-id="' + a.id + '">' +
        '<div class="motion-info">' +
          '<div class="motion-text">🚨 Bewegung erkannt — ' + a.sensor + '</div>' +
          '<div class="motion-meta">' + formatDate(a.timestamp) + ' ' + formatTime(a.timestamp) + ' · ' + a.address + '</div>' +
        '</div>' +
        '<button class="btn-ack" onclick="ackMotionAlert(\'' + a.id + '\')">✓ Quittieren</button>' +
      '</div>';
  }).join('');
}

// Test-Button: simulierte Bewegung
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('btnTestMotion');
  if (btn) {
    btn.addEventListener('click', function() {
      // Wähle zufälligen Raum für Demo
      var rooms = ['Flur (BLU Motion)', 'Wohnzimmer (BLU Motion)', 'Eingang (BLU Motion)'];
      var room = rooms[Math.floor(Math.random() * rooms.length)];
      var addr = 'AA:BB:CC:' +
                 Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0') + ':' +
                 Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0') + ':' +
                 Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0');
      addMotionAlert(room, addr);
    });
  }

  // Beim Laden: gespeicherte Meldungen wiederherstellen
  loadMotionAlerts();
  renderMotionList();
});
</script>
